<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Noemi & Gustavo</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400;500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0d; --panel: #1a1f1b; --border: rgba(255,255,255,0.08);
      --gold: #c9a96e; --green: #7ecf8a; --red: #cf7e7e;
      --text: #e8e4de; --muted: rgba(255,255,255,0.45);
      --font: 'Jost', sans-serif; --title: 'Cinzel', serif;
    }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

    /* LOGIN */
    .login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .login-box { background: var(--panel); border: 1px solid var(--border); padding: 48px 40px; width: 100%; max-width: 400px; }
    .login-box h1 { font-family: var(--title); font-size: 1.3rem; font-weight: 400; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 6px; }
    .login-box .subtitle { font-size: 0.68rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); margin-bottom: 36px; }
    .login-box input { display: block; width: 100%; padding: 12px 0; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.2); color: var(--text); font-family: var(--font); font-size: 0.9rem; outline: none; margin-bottom: 20px; transition: border-color 0.2s; }
    .login-box input:focus { border-bottom-color: var(--gold); }
    .login-box input::placeholder { color: var(--muted); }
    .btn-primary { display: block; width: 100%; padding: 14px; background: var(--gold); color: #0d0d0d; border: none; font-family: var(--title); font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; transition: opacity 0.2s; margin-top: 8px; }
    .btn-primary:hover { opacity: 0.85; }
    .error-msg { font-size: 0.78rem; color: var(--red); margin-top: 12px; text-align: center; }

    /* DASHBOARD */
    #dashboard { display: none; }
    .admin-header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; height: 60px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; gap: 16px; }
    .admin-brand { font-family: var(--title); font-size: 0.78rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); white-space: nowrap; flex-shrink: 0; }
    .admin-tabs { display: flex; flex: 1; justify-content: center; }
    .tab-btn { padding: 8px 20px; background: transparent; border: none; border-bottom: 2px solid transparent; font-family: var(--font); font-size: 0.62rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); cursor: pointer; transition: color 0.2s; }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
    .btn-logout { background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: var(--font); font-size: 0.6rem; letter-spacing: 0.14em; text-transform: uppercase; padding: 6px 16px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .btn-logout:hover { border-color: var(--muted); color: var(--text); }

    .admin-content { margin-top: 60px; padding: 40px 32px; max-width: 1100px; margin-left: auto; margin-right: auto; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* STATS */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 40px; }
    .stat-card { background: var(--panel); border: 1px solid var(--border); padding: 28px 24px; text-align: center; }
    .stat-card span { display: block; font-size: 2.8rem; font-weight: 300; line-height: 1; margin-bottom: 8px; }
    .stat-card label { font-size: 0.58rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }
    .stat-card.green span { color: var(--green); }
    .stat-card.red span { color: var(--red); }

    /* SECTION TITLE */
    .section-title { font-family: var(--title); font-size: 0.68rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold); margin-bottom: 20px; }

    /* CONFIRMED LIST */
    .confirmed-list { background: var(--panel); border: 1px solid var(--border); }
    .confirmed-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid var(--border); font-size: 0.82rem; }
    .confirmed-row:last-child { border-bottom: none; }
    .empty-state { padding: 48px; text-align: center; color: var(--muted); font-size: 0.82rem; font-style: italic; }

    /* STATUS BADGE */
    .status-badge { font-size: 0.56rem; letter-spacing: 0.12em; text-transform: uppercase; padding: 3px 10px; border: 1px solid; }
    .status-badge.pending { color: var(--muted); border-color: rgba(255,255,255,0.15); }
    .status-badge.confirmed { color: var(--green); border-color: var(--green); }
    .status-badge.declined { color: var(--red); border-color: var(--red); }

    /* FAMILIES */
    .families-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .btn-add { padding: 8px 20px; background: transparent; border: 1px solid var(--gold); color: var(--gold); font-family: var(--font); font-size: 0.6rem; letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
    .btn-add:hover { background: var(--gold); color: var(--bg); }
    .add-family-form { background: var(--panel); border: 1px solid var(--gold); padding: 24px; margin-bottom: 20px; display: none; }
    .add-family-form.open { display: block; }
    .add-family-form h4 { font-family: var(--title); font-size: 0.68rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; }
    .add-family-form input { display: block; width: 100%; padding: 10px 0; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.2); color: var(--text); font-family: var(--font); font-size: 0.9rem; outline: none; margin-bottom: 16px; }
    .add-family-form input:focus { border-bottom-color: var(--gold); }
    .add-family-form input::placeholder { color: var(--muted); }
    .form-actions { display: flex; gap: 8px; }

    .family-card { background: var(--panel); border: 1px solid var(--border); margin-bottom: 8px; }
    .family-card-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; }
    .family-card-header h3 { font-family: var(--title); font-size: 0.78rem; font-weight: 400; letter-spacing: 0.12em; text-transform: uppercase; }
    .family-count { font-size: 0.62rem; color: var(--muted); margin-left: 10px; }
    .family-card-body { padding: 0 20px 16px; }
    .guest-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); gap: 12px; flex-wrap: wrap; }
    .guest-row:last-of-type { border-bottom: none; }
    .guest-name { font-size: 0.82rem; flex: 1; }

    .btn-sm { padding: 7px 16px; background: var(--gold); border: none; color: var(--bg); font-family: var(--font); font-size: 0.58rem; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; transition: opacity 0.2s; white-space: nowrap; }
    .btn-sm:hover { opacity: 0.85; }
    .btn-sm.outline { background: transparent; border: 1px solid var(--border); color: var(--muted); }
    .btn-sm.outline:hover { border-color: var(--muted); color: var(--text); opacity: 1; }

    .btn-delete { background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: var(--font); font-size: 0.58rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 10px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .btn-delete:hover { border-color: var(--red); color: var(--red); }

    .add-member-row { display: flex; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
    .add-member-row input { flex: 1; padding: 8px 12px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: var(--text); font-family: var(--font); font-size: 0.82rem; outline: none; transition: border-color 0.2s; }
    .add-member-row input:focus { border-color: var(--gold); }
    .add-member-row input::placeholder { color: var(--muted); }

    /* MESSAGES */
    .msg-admin-card { background: var(--panel); border: 1px solid var(--border); padding: 20px 24px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; }
    .msg-admin-card .author { font-family: var(--title); font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; }
    .msg-admin-card .content { font-size: 0.82rem; color: var(--muted); line-height: 1.7; }
    .msg-admin-card .date { font-size: 0.6rem; color: var(--muted); margin-top: 6px; }

    /* CONFIG */
    .config-form { max-width: 560px; }
    .config-section-title { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin: 36px 0 20px; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 8px; }
    .config-group { margin-bottom: 28px; }
    .config-group label { display: block; font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .config-group input { display: block; width: 100%; padding: 12px 0; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.2); color: var(--text); font-family: var(--font); font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
    .config-group input:focus { border-bottom-color: var(--gold); }
    .save-success { display: none; font-size: 0.78rem; color: var(--green); margin-top: 12px; }

    @media (max-width: 768px) {
      .admin-header { padding: 0 16px; }
      .tab-btn { padding: 8px 10px; font-size: 0.56rem; }
      .admin-content { padding: 24px 16px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .admin-brand { display: none; }
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login-screen" class="login-screen">
    <div class="login-box">
      <h1>Painel Admin</h1>
      <p class="subtitle">Noemi &amp; Gustavo · 08.10.2026</p>
      <form onsubmit="doLogin(event)">
        <input type="email" id="login-email" placeholder="E-mail" required autocomplete="email"/>
        <input type="password" id="login-password" placeholder="Senha" required autocomplete="current-password"/>
        <button type="submit" class="btn-primary" id="login-btn">Entrar</button>
        <p id="login-error" class="error-msg" style="display:none;"></p>
      </form>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">
    <header class="admin-header">
      <div class="admin-brand">N&amp;G · Admin</div>
      <nav class="admin-tabs">
        <button class="tab-btn active" onclick="showTab('resumo',this)">Resumo</button>
        <button class="tab-btn" onclick="showTab('convidados',this)">Convidados</button>
        <button class="tab-btn" onclick="showTab('recados',this)">Recados</button>
        <button class="tab-btn" onclick="showTab('config',this)">Configurações</button>
      </nav>
      <button class="btn-logout" onclick="doLogout()">Sair</button>
    </header>

    <main class="admin-content">

      <!-- RESUMO -->
      <div id="panel-resumo" class="tab-panel active">
        <div class="stats-grid">
          <div class="stat-card"><span id="stat-total">—</span><label>Total</label></div>
          <div class="stat-card green"><span id="stat-confirmed">—</span><label>Confirmados</label></div>
          <div class="stat-card red"><span id="stat-declined">—</span><label>Não vão</label></div>
          <div class="stat-card"><span id="stat-pending">—</span><label>Pendentes</label></div>
        </div>
        <p class="section-title">Confirmações recentes</p>
        <div class="confirmed-list"><div id="confirmed-list-body"></div></div>
      </div>

      <!-- CONVIDADOS -->
      <div id="panel-convidados" class="tab-panel">
        <div class="families-header">
          <p class="section-title" style="margin-bottom:0;">Lista de Convidados</p>
          <button class="btn-add" onclick="toggleAddFamilyForm()">+ Nova Família</button>
        </div>
        <div id="add-family-form" class="add-family-form">
          <h4>Nova Família</h4>
          <input type="text" id="new-family-name" placeholder="Ex: Família Silva"/>
          <div class="form-actions">
            <button class="btn-sm" onclick="addFamily()">Adicionar</button>
            <button class="btn-sm outline" onclick="toggleAddFamilyForm()">Cancelar</button>
          </div>
        </div>
        <div id="families-list"></div>
      </div>

      <!-- RECADOS -->
      <div id="panel-recados" class="tab-panel">
        <p class="section-title">Recados dos Convidados</p>
        <div id="messages-admin-list"></div>
      </div>

      <!-- CONFIGURAÇÕES -->
      <div id="panel-config" class="tab-panel">
        <p class="section-title">Configurações do Site</p>
        <div class="config-form">

          <p class="config-section-title">O Evento</p>
          <div class="config-group">
            <label>Nome do local</label>
            <input type="text" id="config-venue-name" placeholder="ex: Jardim Riviera"/>
          </div>
          <div class="config-group">
            <label>Cidade do local</label>
            <input type="text" id="config-venue-city" placeholder="ex: João Pessoa — PB"/>
          </div>
          <div class="config-group">
            <label>Data e hora (exibição no site)</label>
            <input type="text" id="config-venue-datetime" placeholder="ex: 08 de Outubro de 2026 · 15h00"/>
          </div>
          <div class="config-group">
            <label>Link do Google Maps</label>
            <input type="url" id="config-maps-link" placeholder="https://maps.google.com/..."/>
          </div>
          <div class="config-group">
            <label>Data/hora do casamento (para contagem regressiva)</label>
            <input type="text" id="config-wedding-datetime" placeholder="ex: 2026-10-08T15:00:00"/>
          </div>

          <p class="config-section-title">Textos</p>
          <div class="config-group">
            <label>Hero — Linha de data</label>
            <input type="text" id="config-hero-date" placeholder="ex: 08 · 10 · 2026"/>
          </div>
          <div class="config-group">
            <label>Hero — Localização</label>
            <input type="text" id="config-hero-location" placeholder="ex: João Pessoa, PB"/>
          </div>
          <div class="config-group">
            <label>Subtítulo da introdução</label>
            <input type="text" id="config-intro-subtitle" placeholder="ex: Estamos muito felizes em compartilhar..."/>
          </div>
          <div class="config-group">
            <label>Data no rodapé</label>
            <input type="text" id="config-footer-date" placeholder="ex: 08 de Outubro de 2026"/>
          </div>
          <div class="config-group">
            <label>Prazo de confirmação de presença</label>
            <input type="text" id="config-deadline" placeholder="ex: 31 de Julho de 2026"/>
          </div>
          <div class="config-group">
            <label>Frase do rodapé</label>
            <input type="text" id="config-quote" placeholder="ex: e foi assim, de repente, que tudo fez sentido."/>
          </div>

          <p class="config-section-title">Pagamento</p>
          <div class="config-group">
            <label>Chave PIX</label>
            <input type="text" id="config-pix" placeholder="CPF, e-mail ou chave aleatória"/>
          </div>
          <div class="config-group">
            <label>Link de pagamento por cartão</label>
            <input type="url" id="config-card-link" placeholder="https://mpago.la/..."/>
          </div>

          <button class="btn-primary" style="width:auto;display:inline-block;padding:12px 40px;" onclick="saveConfig()">Salvar Alterações</button>
          <p id="config-success" class="save-success">✓ Alterações salvas com sucesso!</p>
        </div>
      </div>

    </main>
  </div>

  <script>
    const { createClient } = supabase;
    const sb = createClient(
      'https://mbiqqfinheponamecovs.supabase.co',
      'sb_publishable_z1AM8yoagsTudefecB9raA_bCYzHUqa'
    );

    async function checkSession() {
      const { data: { session } } = await sb.auth.getSession();
      if (session) showDashboard();
    }

    async function doLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      btn.textContent = 'Entrando...';
      btn.disabled = true;
      const { error } = await sb.auth.signInWithPassword({
        email: document.getElementById('login-email').value.trim(),
        password: document.getElementById('login-password').value
      });
      if (error) {
        document.getElementById('login-error').textContent = 'E-mail ou senha incorretos.';
        document.getElementById('login-error').style.display = 'block';
        btn.textContent = 'Entrar';
        btn.disabled = false;
      } else {
        showDashboard();
      }
    }

    async function doLogout() {
      await sb.auth.signOut();
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('login-screen').style.display = 'flex';
    }

    function showDashboard() {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadResumo();
    }

    function showTab(name, btn) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('panel-' + name).classList.add('active');
      if (btn) btn.classList.add('active');
      if (name === 'resumo') loadResumo();
      if (name === 'convidados') loadFamilies();
      if (name === 'recados') loadAdminMessages();
      if (name === 'config') loadConfig();
    }

    // RESUMO
    async function loadResumo() {
      const { data: guests } = await sb.from('guests').select('name, status');
      if (!guests) return;
      const confirmed = guests.filter(g => g.status === 'confirmed');
      const declined  = guests.filter(g => g.status === 'declined');
      const pending   = guests.filter(g => g.status === 'pending');
      document.getElementById('stat-total').textContent     = guests.length;
      document.getElementById('stat-confirmed').textContent = confirmed.length;
      document.getElementById('stat-declined').textContent  = declined.length;
      document.getElementById('stat-pending').textContent   = pending.length;
      const listEl = document.getElementById('confirmed-list-body');
      listEl.innerHTML = confirmed.length === 0
        ? '<div class="empty-state">Nenhuma confirmação ainda.</div>'
        : confirmed.map(g => `
            <div class="confirmed-row">
              <span>${esc(g.name)}</span>
              <span class="status-badge confirmed">Confirmado</span>
            </div>`).join('');
    }

    // CONVIDADOS
    let familiesData = [];
    async function loadFamilies() {
      const [{ data: families }, { data: guests }] = await Promise.all([
        sb.from('families').select('id, name').order('name'),
        sb.from('guests').select('id, family_id, name, status')
      ]);
      if (!families) return;
      familiesData = families.map(f => ({
        ...f,
        members: (guests || []).filter(g => g.family_id === f.id)
      }));
      renderFamilies();
    }

    function renderFamilies() {
      const el = document.getElementById('families-list');
      if (familiesData.length === 0) {
        el.innerHTML = '<div class="empty-state">Nenhuma família cadastrada.</div>';
        return;
      }
      el.innerHTML = familiesData.map(f => `
        <div class="family-card">
          <div class="family-card-header">
            <div style="display:flex;align-items:center;">
              <h3>${esc(f.name)}</h3>
              <span class="family-count">${f.members.length} ${f.members.length === 1 ? 'membro' : 'membros'}</span>
            </div>
            <button class="btn-delete" onclick="deleteFamily('${f.id}','${esc(f.name)}')">Excluir família</button>
          </div>
          <div class="family-card-body">
            ${f.members.map(m => `
              <div class="guest-row">
                <span class="guest-name">${esc(m.name)}</span>
                <span class="status-badge ${m.status}">${statusLabel(m.status)}</span>
                <button class="btn-delete" onclick="deleteGuest('${m.id}')">Remover</button>
              </div>`).join('')}
            <div class="add-member-row">
              <input type="text" id="nm-${f.id}" placeholder="Nome do convidado"/>
              <button class="btn-sm" onclick="addGuest('${f.id}')">Adicionar</button>
            </div>
          </div>
        </div>`).join('');
    }

    function statusLabel(s) {
      return s === 'confirmed' ? 'Confirmado' : s === 'declined' ? 'Não vai' : 'Pendente';
    }

    function toggleAddFamilyForm() {
      const form = document.getElementById('add-family-form');
      form.classList.toggle('open');
      if (form.classList.contains('open')) document.getElementById('new-family-name').focus();
    }

    async function addFamily() {
      const name = document.getElementById('new-family-name').value.trim();
      if (!name) return;
      const { error } = await sb.from('families').insert({ name });
      if (error) { alert('Erro ao adicionar família.'); return; }
      document.getElementById('add-family-form').classList.remove('open');
      loadFamilies();
    }

    async function addGuest(familyId) {
      const input = document.getElementById('nm-' + familyId);
      const name = input.value.trim();
      if (!name) return;
      const { error } = await sb.from('guests').insert({ family_id: familyId, name });
      if (error) { alert('Erro ao adicionar convidado.'); return; }
      input.value = '';
      loadFamilies();
    }

    async function deleteGuest(id) {
      if (!confirm('Remover este convidado?')) return;
      await sb.from('guests').delete().eq('id', id);
      loadFamilies();
    }

    async function deleteFamily(id, name) {
      if (!confirm('Excluir "' + name + '" e todos os membros?')) return;
      await sb.from('families').delete().eq('id', id);
      loadFamilies();
    }

    // RECADOS
    async function loadAdminMessages() {
      const { data } = await sb.from('messages').select('id, author, content, created_at')
        .order('created_at', { ascending: false });
      const el = document.getElementById('messages-admin-list');
      if (!data || data.length === 0) {
        el.innerHTML = '<div class="empty-state">Nenhum recado ainda.</div>';
        return;
      }
      el.innerHTML = data.map(m => `
        <div class="msg-admin-card">
          <div>
            <p class="author">${esc(m.author)}</p>
            <p class="content">${esc(m.content)}</p>
            <p class="date">${new Date(m.created_at).toLocaleString('pt-BR')}</p>
          </div>
          <button class="btn-delete" onclick="deleteMessage('${m.id}')">Excluir</button>
        </div>`).join('');
    }

    async function deleteMessage(id) {
      if (!confirm('Excluir este recado?')) return;
      await sb.from('messages').delete().eq('id', id);
      loadAdminMessages();
    }

    // CONFIGURAÇÕES
    async function loadConfig() {
      const { data } = await sb.from('site_config').select('key, value');
      if (!data) return;
      const cfg = Object.fromEntries(data.map(r => [r.key, r.value]));
      const fill = (id, key) => { if (cfg[key]) document.getElementById(id).value = cfg[key]; };
      fill('config-venue-name',      'venue_name');
      fill('config-venue-city',      'venue_city');
      fill('config-venue-datetime',  'venue_datetime_text');
      fill('config-maps-link',       'venue_maps_link');
      fill('config-wedding-datetime','wedding_datetime');
      fill('config-hero-date',       'hero_date');
      fill('config-hero-location',   'hero_location');
      fill('config-intro-subtitle',  'intro_subtitle');
      fill('config-footer-date',     'footer_date');
      fill('config-deadline',        'rsvp_deadline');
      fill('config-quote',           'footer_quote');
      fill('config-pix',             'pix_key');
      fill('config-card-link',       'card_link');
    }

    async function saveConfig() {
      const fields = [
        { key: 'venue_name',        id: 'config-venue-name' },
        { key: 'venue_city',        id: 'config-venue-city' },
        { key: 'venue_datetime_text', id: 'config-venue-datetime' },
        { key: 'venue_maps_link',   id: 'config-maps-link' },
        { key: 'wedding_datetime',  id: 'config-wedding-datetime' },
        { key: 'hero_date',         id: 'config-hero-date' },
        { key: 'hero_location',     id: 'config-hero-location' },
        { key: 'intro_subtitle',    id: 'config-intro-subtitle' },
        { key: 'footer_date',       id: 'config-footer-date' },
        { key: 'rsvp_deadline',     id: 'config-deadline' },
        { key: 'footer_quote',      id: 'config-quote' },
        { key: 'pix_key',           id: 'config-pix' },
        { key: 'card_link',         id: 'config-card-link' }
      ];
      for (const f of fields) {
        const value = document.getElementById(f.id).value.trim();
        if (value) await sb.from('site_config').upsert({ key: f.key, value });
      }
      const el = document.getElementById('config-success');
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 3000);
    }

    function esc(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    checkSession();
  </script>
</body>
